services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - .:/workspace:cached
      - /workspace/__pycache__
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=change-this-secret-key
      - API_BASE=http://host.docker.internal:1234/v1
      - API_KEY=lm-studio
      - MODEL_NAME=google/gemma-3-4b
      - TEMPERATURE=0.4
      - MAX_TOKENS=700
      - SYSTEM_PROMPT_PATH=/workspace/system-prompt.txt
      - DATABASE_URL=sqlite:///movie_finder.db
    depends_on:
      - chromadb

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma

volumes:
  chroma_data:
